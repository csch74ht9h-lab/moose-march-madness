<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Moose Lodge March Madness 2026</title>
<meta name="viewport" content="width=1080, height=1920">
<meta http-equiv="refresh" content="60">

<style>
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(180deg, #1a1c3a, #0b0d1f);
    color: white;
  }

  .container {
    width: 1080px;
    height: 1920px;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    background: linear-gradient(90deg, #2c2f5a, #3d2f6b);
    padding: 30px 20px;
    text-align: center;
    border-bottom: 4px solid #ffd700;
  }

  .title {
    font-size: 56px;
    font-weight: bold;
    letter-spacing: 2px;
  }

  .subtitle {
    font-size: 26px;
    color: #ffd700;
    margin-top: 8px;
  }

  /* LIVE FEED */
  .live {
    flex: 1;
    margin: 20px;
    border-radius: 20px;
    overflow: hidden;
    background: black;
    box-shadow: 0 0 35px rgba(0,0,0,0.6);
    border: 3px solid rgba(255,215,0,0.3);
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* FOOTER */
  .footer {
    background: linear-gradient(90deg, #2c2f5a, #3d2f6b);
    padding: 20px;
    text-align: center;
    border-top: 4px solid #ffd700;
  }

  .footer-text {
    font-size: 26px;
    line-height: 1.4;
  }

  .highlight {
    color: #ffd700;
    font-weight: bold;
  }
</style>
</head>

<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="title">SOUTH LYON MOOSE LODGE</div>
    <div class="subtitle">MARCH MADNESS 2026 • LIVE SCORES</div>
  </div>

  <!-- LIVE SCOREBOARD -->
  <div class="live">
    <iframe src="https://www.espn.com/mens-college-basketball/scoreboard"></iframe>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-text">
      <span class="highlight">SWEET 16 • ELITE 8 • FINAL FOUR</span><br>
      CHAMPIONSHIP APRIL 6
    </div>
  </div>

</div>
</body>
</html>
