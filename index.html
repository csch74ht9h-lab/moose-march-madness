<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Moose Lodge March Madness 2026</title>
<meta name="viewport" content="width=1080, height=1920">

<!-- Auto refresh every 60 seconds -->
<meta http-equiv="refresh" content="60">

<style>
  body {
    margin: 0;
    font-family: 'Arial Black', Arial, sans-serif;
    background: radial-gradient(circle at top, #2c2f5a, #0f1226);
    color: white;
  }

  .container {
    width: 1080px;
    height: 1920px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 30px 20px 10px 20px;
  }

  .title {
    font-size: 64px;
    letter-spacing: 2px;
  }

  .subtitle {
    font-size: 30px;
    color: #ffd700;
    margin-top: 10px;
  }

  /* LIVE SCORE AREA */
  .live-container {
    flex: 1;
    margin: 20px;
    border-radius: 20px;
    overflow: hidden;
    background: black;
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* PANELS */
  .panel {
    margin: 20px;
    padding: 20px;
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    font-size: 28px;
  }

  .panel h2 {
    color: #ffd700;
    margin-bottom: 10px;
    font-size: 34px;
  }

  /* FOOTER */
  .footer {
    text-align: center;
    font-size: 28px;
    padding: 20px;
    background: rgba(0,0,0,0.4);
  }

  .highlight {
    color: #ffd700;
    font-weight: bold;
  }
</style>
</head>

<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="title">MOOSE LODGE</div>
    <div class="subtitle">MARCH MADNESS 2026 • LIVE</div>
  </div>

  <!-- INFO PANEL -->
  <div class="panel">
    <h2>WATCH EVERY GAME HERE</h2>
    • Wall-to-Wall TVs<br>
    • Featured Games with Sound<br>
    • Full Tournament Coverage
  </div>

  <!-- LIVE SCOREBOARD -->
  <div class="live-container">
    <!-- Use ESPN direct page (works better in signage browser mode) -->
    <iframe src="https://www.espn.com/mens-college-basketball/scoreboard"></iframe>
  </div>

  <!-- SPECIALS -->
  <div class="panel">
    <h2>GAME DAY SPECIALS</h2>
    • Wings & Pitchers<br>
    • Burgers & Fries<br>
    • Ice Cold Beer
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span class="highlight">SWEET 16 • ELITE 8 • FINAL FOUR</span><br>
    CHAMPIONSHIP APRIL 6<br><br>
    JOIN THE MADNESS AT THE MOOSE LODGE
  </div>

</div>
</body>
</html>
