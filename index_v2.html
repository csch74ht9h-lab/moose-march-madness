<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Moose Lodge March Madness 2026</title>
<meta name="viewport" content="width=1080, height=1920">
<meta http-equiv="refresh" content="60">

<style>
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(180deg, #0b0d1f, #1a1c3a);
    color: white;
    overflow: hidden;
  }

  .container {
    width: 1080px;
    height: 1920px;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    background: linear-gradient(90deg, #3d2f6b, #2c2f5a);
    padding: 25px;
    text-align: center;
    border-bottom: 4px solid #ffd700;
  }

  .title {
    font-size: 54px;
    font-weight: bold;
  }

  .subtitle {
    font-size: 26px;
    color: #ffd700;
    margin-top: 5px;
  }

  /* NOW PLAYING */
  .now-playing {
    background: rgba(255,215,0,0.15);
    padding: 12px;
    text-align: center;
    font-size: 26px;
    border-bottom: 2px solid rgba(255,215,0,0.4);
  }

  /* LIVE AREA */
  .live {
    flex: 1;
    margin: 15px;
    border-radius: 20px;
    overflow: hidden;
    background: black;
    border: 3px solid rgba(255,215,0,0.3);
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* TICKER */
  .ticker {
    position: relative;
    height: 80px;
    background: #000;
    overflow: hidden;
    border-top: 3px solid #ffd700;
  }

  .ticker-text {
    position: absolute;
    white-space: nowrap;
    font-size: 28px;
    line-height: 80px;
    animation: scroll 25s linear infinite;
    padding-left: 100%;
  }

  @keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }

  /* FOOTER */
  .footer {
    background: linear-gradient(90deg, #3d2f6b, #2c2f5a);
    padding: 15px;
    text-align: center;
    border-top: 4px solid #ffd700;
    font-size: 24px;
  }

  .highlight {
    color: #ffd700;
    font-weight: bold;
  }
</style>
</head>

<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="title">SOUTH LYON MOOSE LODGE</div>
    <div class="subtitle">MARCH MADNESS 2026 • LIVE</div>
  </div>

  <!-- NOW PLAYING -->
  <div class="now-playing">
    🔴 NOW PLAYING: LIVE TOURNAMENT GAMES
  </div>

  <!-- LIVE SCORES -->
  <div class="live">
    <iframe src="https://www.espn.com/mens-college-basketball/scoreboard"></iframe>
  </div>

  <!-- TICKER -->
  <div class="ticker">
    <div class="ticker-text">
      🏀 March Madness Live • Upsets, Buzzer Beaters & Bracket Busting Action • Watch Every Game Here • Cold Drinks • Great Food • Join the Madness at the Moose Lodge •
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span class="highlight">FINAL FOUR • CHAMPIONSHIP APRIL 6</span>
  </div>

</div>
</body>
</html>
