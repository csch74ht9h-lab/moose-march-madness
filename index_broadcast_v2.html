<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Moose Lodge March Madness Live</title>
<meta name="viewport" content="width=1080, height=1920">

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #0a0c1a;
  color: white;
}

/* GRID LAYOUT (LOCKED TO SCREEN) */
.container {
  width: 1080px;
  height: 1920px;
  display: grid;
  grid-template-rows: 80px 180px 1fr;
  overflow: hidden;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  background: #11142b;
  border-bottom: 3px solid #ffd700;
}

/* FEATURED GAME */
.featured {
  padding: 10px;
  background: linear-gradient(135deg, #1b1f3b, #11142b);
  border-bottom: 3px solid #ffd700;
  overflow: hidden;
}

.featured .status {
  font-size: 24px;
  margin-bottom: 5px;
}

.featured .team {
  display: flex;
  justify-content: space-between;
  font-size: 32px;
}

.featured .score {
  font-size: 42px;
  color: #ffd700;
}

/* GAME GRID */
.games {
  display: grid;
  grid-auto-rows: 1fr;
  gap: 8px;
  padding: 10px 20px;
  overflow: hidden;
}

.game {
  display: flex;
  flex-direction: column;
  justify-content: center;
  background: #1a1c3a;
  border-radius: 10px;
  padding: 8px;
}

/* TEAM ROW */
.team-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.team-left {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 0;
}

.team-name {
  font-size: 40px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.logo {
  width: 36px;
  height: 36px;
  flex-shrink: 0;
}

.score {
  font-size: 40px;
  min-width: 60px;
  text-align: right;
  flex-shrink: 0;
}

.leading {
  color: #ffd700;
  font-weight: bold;
}

.arrow {
  color: #ffd700;
  font-size: 14px;
}

/* STATUS */
.status-top {
  font-size: 16px;
  margin-bottom: 4px;
}

.live-inline {
  color: red;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  MOOSE LODGE • MARCH MADNESS LIVE
</div>

<div class="featured" id="featured">Loading...</div>

<div class="games" id="games">Loading games...</div>

</div>

<script>
const API = "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard";

/* BUILD TEAM ROW */
function buildTeamRow(team, opponent) {
  const score1 = parseInt(team.score || 0);
  const score2 = parseInt(opponent.score || 0);

  const isWinning = score1 > score2;
  const hasPossession = team.possession === true;

  return `
    <div class="team-row">
      <div class="team-left">
        ${hasPossession ? '<span class="arrow">▶</span>' : ''}
        <img class="logo" src="https://a.espncdn.com/i/teamlogos/ncaa/500/${team.team.id}.png">
        <span class="team-name ${isWinning ? 'leading' : ''}">
          ${team.team.shortDisplayName}
        </span>
      </div>
      <div class="score ${isWinning ? 'leading' : ''}">
        ${team.score}
      </div>
    </div>
  `;
}

/* FEATURED GAME */
function renderFeatured(event) {
  if (!event || !event.competitions) {
    document.getElementById("featured").innerHTML = "No featured game";
    return;
  }

  const comp = event.competitions[0];
  const t1 = comp.competitors[0];
  const t2 = comp.competitors[1];

  document.getElementById("featured").innerHTML = `
    <div class="status">
      ${comp.status.type.detail}
    </div>
    <div class="team">
      ${t1.team.shortDisplayName}
      <span class="score">${t1.score}</span>
    </div>
    <div class="team">
      ${t2.team.shortDisplayName}
      <span class="score">${t2.score}</span>
    </div>
  `;
}

/* GAME LIST */
function renderGames(events) {
  const container = document.getElementById("games");
  container.innerHTML = "";

  events.forEach(e => {
    const comp = e.competitions[0];
    const t1 = comp.competitors[0];
    const t2 = comp.competitors[1];

    const isLive = comp.status.type.state === "in";

    const div = document.createElement("div");
    div.className = "game";

    div.innerHTML = `
      <div class="status-top">
        ${isLive ? '<span class="live-inline">● LIVE</span>' : ''}
        ${comp.status.type.detail}
      </div>
      ${buildTeamRow(t1, t2)}
      ${buildTeamRow(t2, t1)}
    `;

    container.appendChild(div);
  });
}

/* LOAD DATA */
async function load() {
  try {
    const res = await fetch(API);
    const data = await res.json();

    if (!data.events) {
      document.getElementById("games").innerHTML = "No data";
      return;
    }

    const events = data.events;

    /* SORT LIVE FIRST */
    events.sort((a,b)=>{
      const order = {in:0, pre:1, post:2};
      return order[a.status.type.state] - order[b.status.type.state];
    });

    renderFeatured(events[0]);

    const games = events.slice(1,7);
    renderGames(games);

  } catch (e) {
    document.getElementById("games").innerHTML = "Error loading scores";
  }
}

load();
setInterval(load, 60000);
</script>

</body>
</html>
