<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Broadcast Scoreboard</title>
<meta name="viewport" content="width=1080, height=1920">

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #0a0c1a;
  color: white;
}

.container {
  width: 1080px;
  height: 1920px;
  display: grid;
  grid-template-rows: 80px 180px 1fr; /* header, featured, games */
  overflow: hidden;
}

/* HEADER */
.header {
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
}

/* FEATURED GAME */
.featured {
  height: 180px;
  padding: 10px;
  overflow: hidden;
}

.featured .team {
  font-size: 28px;
}

.featured .score {
  font-size: 38px;
}

.featured .status {
  font-size: 24px;
  margin-bottom: 10px;
}

/* GAME LIST */
.games {
  display: grid;
  grid-auto-rows: 1fr;   /* AUTO rows instead of fixed */
  gap: 10px;
  padding: 10px 20px;
}

.game {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 8px;
  border-radius: 10px;
  background: #1a1c3a;
}

.game.close {
  border-left: 6px solid orange;
}

.team-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  gap: 10px;
}

.team-left {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;              /* TAKE AVAILABLE SPACE */
  min-width: 0;         /* CRITICAL FOR TEXT TRUNCATION */
}

.logo {
  width: 30px;
}

.leading {
  color: #ffd700;
  font-weight: bold;
}

.arrow {
  color: #ffd700;
}

/* FLASH ANIMATION */
.flash {
  animation: flash 0.6s;
}

@keyframes flash {
  0% { background: #ffd700; }
  100% { background: transparent; }
}

.team-name {
  font-size: 22px;
}
.score {
  font-size: 28px;
}
</style>
</head>

<body>
<div class="container">

<div class="header">MOOSE LODGE • MARCH MADNESS LIVE</div>

<div class="featured" id="featured"></div>

<div class="games" id="games">Loading games...</div>

</div>

<script>
const API = "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard";

let lastScores = {};

function buildTeamRow(team, opp) {
  const win = team.score > opp.score;
  const possession = team.possession;

  return `
  <div class="team-row">
    <div class="team-left">
      ${possession ? '<span class="arrow">▶</span>' : ''}
      <img class="logo" src="https://a.espncdn.com/i/teamlogos/ncaa/500/${team.team.id}.png">
      <span class="${win ? 'leading' : ''}">${team.team.shortDisplayName}</span>
    </div>
    <div class="score ${win ? 'leading' : ''}">
      ${team.score}
    </div>
  </div>
  `;
}

async function load() {
  const res = await fetch(API);
  const data = await res.json();

  const events = data.events;

  // sort live first
  events.sort((a,b)=>{
    const order = {in:0, pre:1, post:2};
    return order[a.status.type.state] - order[b.status.type.state];
  });

  const featuredGame = events[0];
  renderFeatured(featuredGame);

  renderGames(events.slice(1,8));
  buildTicker(events);
}

function renderFeatured(event) {
  if (!event || !event.competitions) {
    document.getElementById("featured").innerHTML = "";
    return;
  }

  const comp = event.competitions[0];
  const t1 = comp.competitors[0];
  const t2 = comp.competitors[1];

  document.getElementById("featured").innerHTML = `
    <div class="status-top">
      ${comp.status.type.detail}
    </div>

    <div class="team-row">
      <span>${t1.team.shortDisplayName}</span>
      <span class="score">${t1.score}</span>
    </div>

    <div class="team-row">
      <span>${t2.team.shortDisplayName}</span>
      <span class="score">${t2.score}</span>
    </div>
  `;
}

function renderGames(events.slice(1,7)); {
  const container = document.getElementById("games");
  container.innerHTML = "";

  events.forEach(e=>{
    const comp = e.competitions[0];
    const t1 = comp.competitors[0];
    const t2 = comp.competitors[1];

    const close = Math.abs(t1.score - t2.score) <= 5;

    const id = e.id;

    let flashClass = "";
    if (lastScores[id] && lastScores[id] !== t1.score + t2.score) {
      flashClass = "flash";
    }

    lastScores[id] = t1.score + t2.score;

    const div = document.createElement("div");
    div.className = "game " + (close ? "close " : "") + flashClass;

    div.innerHTML = `
      <div class="status">${comp.status.type.detail}</div>
      ${buildTeamRow(t1,t2)}
      ${buildTeamRow(t2,t1)}
    `;

    container.appendChild(div);
  });
}


load();
setInterval(load, 60000);
</script>

</body>
</html>
