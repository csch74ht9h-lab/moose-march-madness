<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>March Madness Premium Scoreboard</title>
<meta name="viewport" content="width=1080, height=1920">

<style>
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #0a0c1a;
    color: white;
    overflow: hidden;
  }

  .container {
    width: 1080px;
    height: 1920px;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    background: #11142b;
    padding: 20px;
    border-bottom: 3px solid #ffd700;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .title {
    font-size: 44px;
    font-weight: bold;
  }

  .clock {
    font-size: 28px;
    color: #ffd700;
  }

  /* MAIN GRID */
  .games {
    flex: 1;
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr;
    grid-auto-rows: minmax(140px, auto);
    gap: 18px;
  }

  /* GAME CARD */
  .game {
    background: linear-gradient(135deg, #1b1f3b, #11142b);
    border-left: 6px solid #444;
    border-radius: 14px;
    padding: 16px;
    position: relative;
  }

  .game.live {
    border-left: 6px solid #ff3b3b;
    box-shadow: 0 0 12px rgba(255, 59, 59, 0.5);
  }

  .teams {
    display: flex;
    justify-content: space-between;
    font-size: 28px;
    font-weight: bold;
  }

  .score {
    font-size: 36px;
    color: #ffd700;
  }

  .status {
    font-size: 20px;
    margin-top: 6px;
    opacity: 0.85;
  }
  
.live-inline {
  color: #ff3b3b;
  font-weight: bold;
  margin-right: 8px;
}
  
  /* BOTTOMLINE TICKER */
  .ticker {
    height: 80px;
    background: black;
    border-top: 3px solid #ffd700;
    overflow: hidden;
    position: relative;
  }

  .ticker-text {
    position: absolute;
    white-space: nowrap;
    font-size: 26px;
    line-height: 80px;
    animation: scroll 30s linear infinite;
    padding-left: 100%;
  }

  @keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }

  /* FOOTER */
  .footer {
    background: #11142b;
    padding: 12px;
    text-align: center;
    font-size: 20px;
    border-top: 2px solid #ffd700;
  }
  .status-top {
  font-size: 20px;
  margin-bottom: 8px;
  opacity: 0.9;
}

.live-inline {
  color: #ff3b3b;
  font-weight: bold;
  margin-right: 8px;
}
  .team-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 6px;
}

.team-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.team-name {
  font-size: 28px;
}

.logo {
  width: 36px;
  height: 36px;
}

.score {
  font-size: 36px;
  color: #ccc;
}

.leading {
  color: #ffd700;
  font-weight: bold;
}

.winning .team-name {
  font-weight: bold;
}

.arrow {
  color: #ffd700;
  font-size: 18px;
}

.arrow-placeholder {
  width: 14px;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="title">MOOSE LODGE • LIVE SCORES</div>
      </div>

  <!-- GAMES -->
  <div class="games" id="games">Loading...</div>

  <!-- TICKER -->
  <div class="ticker">
    <div class="ticker-text" id="ticker">
      Loading scores...
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    NCAA MARCH MADNESS • FINAL FOUR • APRIL 6
  </div>

</div>

<script>
const API_URL = "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard";

function buildTeamRow(team, opponent) {
  const isWinning = parseInt(team.score) > parseInt(opponent.score);
  const hasPossession = team.possession === true;

  return `
    <div class="team-row ${isWinning ? 'winning' : ''}">
      
      <div class="team-left">
        ${hasPossession ? '<span class="arrow">▶</span>' : '<span class="arrow-placeholder"></span>'}
        
        <img class="logo" src="https://a.espncdn.com/i/teamlogos/ncaa/500/${team.team.id}.png">
        
        <span class="team-name">${team.team.shortDisplayName}</span>
      </div>

      <div class="score ${isWinning ? 'leading' : ''}">
        ${team.score}
      </div>

    </div>
  `;
}
async function fetchScores() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    const gamesDiv = document.getElementById("games");
    const tickerDiv = document.getElementById("ticker");

    gamesDiv.innerHTML = "";
    let tickerText = "🏀 ";

    const sorted = data.events.sort((a,b)=>{
      const stateOrder = {in:0, pre:1, post:2};
      return stateOrder[a.status.type.state] - stateOrder[b.status.type.state];
    });

    sorted.slice(0,8).forEach(event => {
      const comp = event.competitions[0];
      const t1 = comp.competitors[0];
      const t2 = comp.competitors[1];
      const state = comp.status.type.state;
      const isLive = state === "in";

      const div = document.createElement("div");
      div.className = "game " + (isLive ? "live" : "");

      div.innerHTML = `
  <div class="status-top">
    ${isLive ? '<span class="live-inline">● LIVE</span>' : ''}
    ${comp.status.type.detail}
  </div>

  ${buildTeamRow(t1, t2)}
  ${buildTeamRow(t2, t1)}
`;

  <div class="teams">
    <span>${t1.team.shortDisplayName}</span>
    <span class="score">${t1.score}</span>
  </div>

  <div class="teams">
    <span>${t2.team.shortDisplayName}</span>
    <span class="score">${t2.score}</span>
  </div>
`;

      gamesDiv.appendChild(div);

      tickerText += `${t1.team.abbreviation} ${t1.score} - ${t2.team.abbreviation} ${t2.score} • `;
    });

    tickerDiv.innerText = tickerText;

  } catch {
    document.getElementById("games").innerText = "Error loading scores";
  }
}

fetchScores();
setInterval(fetchScores, 60000);
</script>

</body>
</html>
