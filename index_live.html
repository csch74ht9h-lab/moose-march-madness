<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>March Madness Live Scoreboard</title>
<meta name="viewport" content="width=1080, height=1920">

<style>
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(180deg, #0b0d1f, #1a1c3a);
    color: white;
  }

  .container {
    width: 1080px;
    height: 1920px;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: linear-gradient(90deg, #3d2f6b, #2c2f5a);
    padding: 25px;
    text-align: center;
    border-bottom: 4px solid #ffd700;
  }

  .title {
    font-size: 52px;
    font-weight: bold;
  }

  .subtitle {
    font-size: 24px;
    color: #ffd700;
  }

  .games {
    flex: 1;
    padding: 20px;
    overflow-y: hidden;
  }

  .game {
    background: rgba(255,255,255,0.05);
    margin-bottom: 18px;
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }

  .teams {
    display: flex;
    justify-content: space-between;
    font-size: 30px;
    font-weight: bold;
  }

  .score {
    font-size: 40px;
    color: #ffd700;
  }

  .status {
    font-size: 22px;
    opacity: 0.85;
    margin-top: 6px;
  }

  .live-tag {
    color: #ff4d4d;
    font-weight: bold;
  }

  .ticker {
    height: 70px;
    background: black;
    overflow: hidden;
    border-top: 3px solid #ffd700;
  }

  .ticker-text {
    white-space: nowrap;
    font-size: 26px;
    line-height: 70px;
    animation: scroll 25s linear infinite;
    padding-left: 100%;
  }

  @keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }

  .footer {
    text-align: center;
    padding: 15px;
    font-size: 22px;
    background: #2c2f5a;
  }
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="title">MOOSE LODGE LIVE</div>
    <div class="subtitle">MARCH MADNESS SCOREBOARD</div>
  </div>

  <div class="games" id="games">Loading live scores...</div>

  <div class="ticker">
    <div class="ticker-text">
      🏀 Live NCAA Tournament Scores • Upsets & Buzzer Beaters • Watch All Games Here • Join the Madness •
    </div>
  </div>

  <div class="footer">
    FINAL FOUR • CHAMPIONSHIP APRIL 6
  </div>

</div>

<script>
const API_URL = "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard";

async function fetchScores() {
  try {
    const response = await fetch(API_URL);
    const data = await response.json();

    const gamesContainer = document.getElementById("games");
    gamesContainer.innerHTML = "";

    data.events.forEach(event => {
      const comp = event.competitions[0];
      const competitors = comp.competitors;

      const team1 = competitors[0];
      const team2 = competitors[1];

      const isLive = comp.status.type.state === "in";

      const div = document.createElement("div");
      div.className = "game";

      div.innerHTML = `
        <div class="teams">
          <span>${team1.team.shortDisplayName}</span>
          <span class="score">${team1.score}</span>
        </div>
        <div class="teams">
          <span>${team2.team.shortDisplayName}</span>
          <span class="score">${team2.score}</span>
        </div>
        <div class="status">
          ${isLive ? '<span class="live-tag">● LIVE</span>' : ''}
          ${comp.status.type.detail}
        </div>
      `;

      gamesContainer.appendChild(div);
    });

  } catch (err) {
    document.getElementById("games").innerHTML = "Error loading scores";
  }
}

// Initial load
fetchScores();

// Refresh every 60 seconds
setInterval(fetchScores, 60000);
</script>

</body>
</html>
