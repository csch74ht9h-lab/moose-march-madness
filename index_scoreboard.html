<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>March Madness Live Scoreboard</title>
<meta name="viewport" content="width=1080, height=1920">

<style>
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(180deg, #0b0d1f, #1a1c3a);
    color: white;
  }

  .container {
    width: 1080px;
    height: 1920px;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    background: linear-gradient(90deg, #3d2f6b, #2c2f5a);
    padding: 25px;
    text-align: center;
    border-bottom: 4px solid #ffd700;
  }

  .title {
    font-size: 52px;
    font-weight: bold;
  }

  .subtitle {
    font-size: 24px;
    color: #ffd700;
  }

  /* GAME LIST */
  .games {
    flex: 1;
    padding: 20px;
    overflow: hidden;
  }

  .game {
    background: rgba(255,255,255,0.05);
    margin-bottom: 18px;
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }

  .teams {
    display: flex;
    justify-content: space-between;
    font-size: 30px;
    font-weight: bold;
  }

  .score {
    font-size: 40px;
    color: #ffd700;
  }

  .status {
    font-size: 22px;
    opacity: 0.8;
    margin-top: 5px;
  }

  /* TICKER */
  .ticker {
    height: 70px;
    background: black;
    overflow: hidden;
    border-top: 3px solid #ffd700;
  }

  .ticker-text {
    white-space: nowrap;
    font-size: 26px;
    line-height: 70px;
    animation: scroll 25s linear infinite;
    padding-left: 100%;
  }

  @keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }

  /* FOOTER */
  .footer {
    text-align: center;
    padding: 15px;
    font-size: 22px;
    background: #2c2f5a;
  }
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="title">MOOSE LODGE LIVE</div>
    <div class="subtitle">MARCH MADNESS SCOREBOARD</div>
  </div>

  <!-- GAMES -->
  <div class="games" id="games"></div>

  <!-- TICKER -->
  <div class="ticker">
    <div class="ticker-text">
      🏀 Live Tournament Action • Upsets & Buzzer Beaters • Watch All Games Here • Food & Drink Specials • Join the Madness •
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    FINAL FOUR • CHAMPIONSHIP APRIL 6
  </div>

</div>

<script>
const sampleGames = [
  {team1:"Michigan", score1:72, team2:"Duke", score2:68, status:"Final"},
  {team1:"Purdue", score1:55, team2:"Houston", score2:60, status:"2nd Half"},
  {team1:"Kansas", score1:0, team2:"UConn", score2:0, status:"Starts 7:30 PM"},
  {team1:"Tennessee", score1:64, team2:"Arizona", score2:61, status:"Final"},
  {team1:"Gonzaga", score1:45, team2:"Baylor", score2:50, status:"Halftime"}
];

function renderGames(games) {
  const container = document.getElementById("games");
  container.innerHTML = "";

  games.forEach(g => {
    const div = document.createElement("div");
    div.className = "game";

    div.innerHTML = `
      <div class="teams">
        <span>${g.team1}</span>
        <span class="score">${g.score1}</span>
      </div>
      <div class="teams">
        <span>${g.team2}</span>
        <span class="score">${g.score2}</span>
      </div>
      <div class="status">${g.status}</div>
    `;

    container.appendChild(div);
  });
}

renderGames(sampleGames);

/* Auto refresh every 60 seconds */
setInterval(() => {
  renderGames(sampleGames);
}, 60000);
</script>

</body>
</html>
